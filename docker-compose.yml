services:
  products-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: products
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - products-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  orders-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: orders
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5435:5432"
    volumes:
      - orders-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: auth
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5436:5432"
    volumes:
      - auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  products-service:
    build:
      context: .
      dockerfile: Dockerfile.products
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Conexión interna a la red de Docker (products-db en lugar de localhost)
      - DATABASE_URL=postgresql://postgres:rootpassword@products-db:5432/products?schema=public
    depends_on:
      products-db:
        condition: service_healthy

  orders-service:
    build:
      context: .
      dockerfile: Dockerfile.orders
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      # Conexión interna a la red de Docker (orders-db)
      - DATABASE_URL=postgresql://postgres:rootpassword@orders-db:5432/orders?schema=public
      # Conexión REST a API de Productos usando el nombre del contenedor
      - PRODUCTS_SERVICE_URL=http://products-service:3001/api/v1
    depends_on:
      orders-db:
        condition: service_healthy
      products-service:
        condition: service_started

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.auth
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - JWT_SECRET=super-secret-key-for-test-only
      - DATABASE_URL=postgresql://postgres:rootpassword@auth-db:5432/auth?schema=public
    depends_on:
      auth-db:
        condition: service_healthy

  api-gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - products-service
      - orders-service
      - auth-service

volumes:
  products-data:
  orders-data:
  auth-data:
