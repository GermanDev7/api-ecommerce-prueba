server {
    listen 80;
    server_name localhost;

    # Rutear peticiones exactas de Products
    location /api/v1/products {
        proxy_pass http://products-service:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rutear peticiones exactas de Orders
    location /api/v1/orders {
        proxy_pass http://orders-service:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redireccionar documentación Swagger
    location /api/docs {
        # Necesitamos diferenciar, enviamos ambos al respectivo doc
        # Por simplicidad, el Gateway puede rootear Swagger de products a la raíz
        proxy_pass http://products-service:3001/api/docs;
    }
}
